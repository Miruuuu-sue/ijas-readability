name: Daily Paper Collection

on:
  # 毎日 UTC 00:00 (JST 09:00) に実行
  schedule:
    - cron: "0 0 * * *"
  # 手動実行
  workflow_dispatch:
    inputs:
      days_back:
        description: "過去何日分を取得するか (空白 = config.yaml の値を使用)"
        required: false
        default: ""
      no_scoring:
        description: "LLM スコアリングをスキップする (true/false)"
        required: false
        default: "false"

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Override days_back if specified
        if: ${{ github.event.inputs.days_back != '' }}
        run: |
          python - <<'EOF'
          import yaml
          with open("config.yaml") as f:
              cfg = yaml.safe_load(f)
          cfg["search"]["days_back"] = int("${{ github.event.inputs.days_back }}")
          with open("config.yaml", "w") as f:
              yaml.dump(cfg, f, allow_unicode=True, default_flow_style=False)
          print(f"days_back を {cfg['search']['days_back']} に設定しました")
          EOF

      - name: Collect and score papers
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.no_scoring }}" = "true" ]; then
            ARGS="--no-scoring"
          fi
          python collect_papers.py $ARGS

      - name: Commit and push collected papers
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add papers/
          if git diff --cached --quiet; then
            echo "関連論文なし - コミットをスキップします"
          else
            DATE=$(date -u +"%Y-%m-%d")
            COUNT=$(git diff --cached --name-only | wc -l)
            git commit -m "chore: collect papers ${DATE} (${COUNT} files)"
            git push
          fi
